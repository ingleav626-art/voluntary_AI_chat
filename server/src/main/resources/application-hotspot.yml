# 热点测试环境配置
# 用于局域网测试（手机热点连接）

spring:
  application:
    name: voluntary-ai-chat-server

  datasource:
    url: jdbc:mysql://localhost:3306/voluntary_ai_chat?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000
      connect-timeout: 2000

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZg==
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

logging:
  level:
    root: INFO
    com.voluntary.chat: DEBUG
    org.springframework.security: DEBUG

server:
  # 绑定到所有网络接口，允许局域网访问
  address: 0.0.0.0
  port: 8080
  # 热点模式启用广播服务
  broadcast:
    enabled: true
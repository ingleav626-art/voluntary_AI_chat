spring:
  application:
    name: voluntary-ai-chat-server

  datasource:
    url: jdbc:mysql://localhost:3306/voluntary_ai_chat?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000
      connect-timeout: 2000
      # 开发环境不强制依赖 Redis，验证码使用内存存储

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZg==}
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

logging:
  level:
    root: WARN
    com.voluntary.chat: INFO
    com.voluntary.chat.server.security: WARN

server:
  port: 8080

upload:
  image:
    dir: uploads/chat/images
    base-url: http://localhost:8080/files
  avatar:
    dir: uploads/avatars
    base-url: http://localhost:8080/avatars

# Redis 缓存配置（默认值）
app:
  cache:
    enabled: true
    conversation:
      ttl: 86400          # 会话缓存 1 天
    online-status:
      ttl: 30             # 在线状态 30 秒
    unread:
      ttl: 604800         # 未读数 7 天
    group-members:
      ttl: 0              # 永不过期（成员变更时更新）
    ai-memory:
      ttl: 1800           # AI 记忆 30 分钟
    offline-message:
      max-size: 1000      # 离线队列最大长度

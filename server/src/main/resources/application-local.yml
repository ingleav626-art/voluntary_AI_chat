# 本地模式配置（精简启动，仅AI组件）
# 启动方式：--spring.profiles.active=local
# 适用场景：纯AI聊天、隐私模式、云端服务器不可用

spring:
  main:
    lazy-initialization: true
    banner-mode: off
    # 仅加载AI相关组件，排除真人聊天模块
    web-application-type: servlet

  jmx:
    enabled: false

  datasource:
    url: jdbc:h2:file:${user.dir}/data/voluntary_ai_chat;AUTO_SERVER=TRUE;MODE=MySQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      initialization-fail-timeout: -1
      connection-timeout: 5000

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never
      encoding: UTF-8

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    encoding: UTF-8

  # 本地模式不依赖 Redis
  data:
    redis:
      enabled: false

  jackson:
    default-property-inclusion: non_null

  # 禁用不必要的端点
  management:
    endpoints:
      enabled-by-default: false

# 应用数据目录
app:
  data:
    dir: ./data

# 本地模式配置
local:
  mode:
    enabled: true
    # 仅加载AI相关组件
    ai-only: true
    # 排除真人聊天模块
    exclude-modules:
      - friend
      - group
      - conversation
      - message-human

# 向量库配置（本地Lucene）
vector:
  store:
    type: lucene
    enabled: true
    index-dir: ${app.data.dir}/vector-index

# AI配置
ai:
  # API Key 加密密钥（必须为32字节，生产环境通过环境变量覆盖）
  encryption-key: ${AI_ENCRYPTION_KEY:dev-only-encryption-key-32b!}
  context:
    max-history-rounds: 10
    max-memory-count: 10
    memory-similarity-threshold: 0.7
  memory:
    summarize-threshold: 20
    max-summary-length: 500
  vector:
    enabled: false
    type: milvus
  providers:
    openai:
      base-url: https://api.openai.com/v1
    deepseek:
      base-url: https://api.deepseek.com/v1
    qwen:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    zhipu:
      base-url: https://open.bigmodel.cn/api/paas/v4

# 优化日志级别
logging:
  level:
    root: WARN
    com.voluntary.chat: INFO
    com.voluntary.chat.server.service.AiChatService: DEBUG
    org.springframework.boot.autoconfigure: WARN

server:
  port: 8080

upload:
  image:
    dir: ${app.data.dir}/uploads/chat/images
    base-url: http://localhost:8080/files
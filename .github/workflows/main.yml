name: Java CI with Maven

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ 17 ]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: 代码风格检查 (Checkstyle)
        run: mvn checkstyle:check --no-transfer-progress --batch-mode

      - name: 编译 + 单元测试 + 覆盖率 (Maven Verify)
        run: mvn verify --no-transfer-progress --batch-mode -Dspotbugs.skip=true

      - name: 潜在Bug检测 (SpotBugs)
        run: mvn spotbugs:check spotbugs:spotbugs --no-transfer-progress --batch-mode

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ matrix.java-version }}
          path: target/site/jacoco

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports-${{ matrix.java-version }}
          path: target/surefire-reports

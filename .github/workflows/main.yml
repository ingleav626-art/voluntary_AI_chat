name: Java CI with Maven

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  checkout:
    name: Checkout & Setup JDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 17 ]
    outputs:
      java-version: ${{ matrix.java-version }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置 JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: 缓存 Maven 依赖
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

  checkstyle:
    name: Checkstyle (代码风格检查)
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    strategy:
      matrix:
        java-version: [ 17 ]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置 JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: 代码风格检查 (Checkstyle)
        run: mvn checkstyle:check -pl common,server --no-transfer-progress --batch-mode
        continue-on-error: true

      - name: 上传 Checkstyle 报告
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: checkstyle-report-${{ matrix.java-version }}
          path: |
            common/target/checkstyle-result.xml
            server/target/checkstyle-result.xml

  test:
    name: Test (单元测试 + 覆盖率)
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    strategy:
      matrix:
        java-version: [ 17 ]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置 JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: 编译 + 单元测试 + 覆盖率 (Maven Verify)
        run: mvn verify -pl common,server --no-transfer-progress --batch-mode -Dcheckstyle.skip=true -Dspotbugs.skip=true
        continue-on-error: true

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: jacoco-report-${{ matrix.java-version }}
          path: server/target/site/jacoco

      - name: 上传测试报告
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: surefire-reports-${{ matrix.java-version }}
          path: server/target/surefire-reports

  spotbugs:
    name: SpotBugs (潜在Bug检测)
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    strategy:
      matrix:
        java-version: [ 17 ]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置 JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: 潜在Bug检测 (SpotBugs)
        run: mvn spotbugs:check spotbugs:spotbugs -pl common,server --no-transfer-progress --batch-mode -Dcheckstyle.skip=true
        continue-on-error: true

      - name: 上传 SpotBugs 报告
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: spotbugs-report-${{ matrix.java-version }}
          path: |
            common/target/spotbugsXml.xml
            server/target/spotbugsXml.xml
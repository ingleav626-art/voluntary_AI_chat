# 测试环境配置
spring:
  # 数据源配置（使用 H2 内存数据库）
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # Redis 配置（使用嵌入式 Redis）
  data:
    redis:
      port: 6379

  # 安全配置
  security:
    user:
      name: test
      password: test

  # 测试配置
  main:
    allow-bean-definition-overriding: true

# 测试日志配置
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.voluntary: DEBUG

# 测试端口
server:
  port: 0

# 测试配置
test:
  database:
    initialize: true
  redis:
    embedded: true
